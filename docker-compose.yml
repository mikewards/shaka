services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: shaka
      POSTGRES_USER: shaka
      POSTGRES_PASSWORD: shaka
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
