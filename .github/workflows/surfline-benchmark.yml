name: Surfline Benchmark

on:
  schedule:
    - cron: '0 14 * * 1'  # Every Monday at 2pm UTC (midday swell window)
  workflow_dispatch:       # Manual trigger

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements-benchmark.txt
          pip install playwright
          python -m playwright install chromium

      - name: Scrape fresh Surfline data
        run: python scripts/surfline_scraper.py

      - name: Run benchmark
        run: python scripts/surfline_benchmark.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            scripts/data/benchmark_results.csv
            scripts/data/benchmark_summary.txt
