name: CI

on:
  push:
    branches: [main]
    paths:
      - 'shaka-api/**'
      - 'shaka-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Kotlin tests
        working-directory: shaka-api
        run: ./gradlew test

  flutter-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Informational while existing deprecation warnings are burned down
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze Flutter app
        working-directory: shaka-app
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
