name: CI

on:
  push:
    branches: [main]
    paths:
      - 'shaka-api/**'
      - 'shaka-app/**'
      - '.github/workflows/ci.yml'
  pull_request:
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Kotlin tests
        working-directory: shaka-api
        run: ./gradlew test

  flutter-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Informational while existing deprecation warnings are burned down
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Analyze Flutter app
        working-directory: shaka-app
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos

  # Contract test for the synthetic monitor (docs/synthetic-monitor-design.md §c):
  # boots the API against a seeded Postgres with schedulers disabled and runs the
  # probe's Tier-1 journeys in --local mode. A refactor that breaks a probe
  # assumption (dropped endpoint, changed response shape, tide model change)
  # fails THIS job on the PR — not production monitoring two weeks later.
  probe-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      # ci.yml's pull_request trigger has no global paths filter (api-tests
      # should keep running on every PR), so this job filters itself.
      - uses: dorny/paths-filter@v3
        id: relevant
        with:
          filters: |
            monitor:
              - 'shaka-api/**'
              - 'monitoring/**'
              - '.github/workflows/ci.yml'

      # Plain postgis container WITHOUT db/init.sql: the contract test only
      # needs postgres+postgis — the API creates its own tables at boot and
      # seed.sql creates the rest. Mounting the 2500-line dev init.sql here
      # couples monitor CI to unrelated schema churn (and its GIST-index bug
      # killed the container on first cold start).
      - name: Start Postgres (postgis)
        if: steps.relevant.outputs.monitor == 'true'
        run: |
          docker run -d --name ci-db \
            -e POSTGRES_DB=shaka -e POSTGRES_USER=shaka -e POSTGRES_PASSWORD=shaka \
            -p 5432:5432 postgis/postgis:16-3.4
          # The postgis entrypoint boots a TEMPORARY server for init, then
          # restarts — wait for the SECOND "ready to accept connections".
          for i in $(seq 1 60); do
            ready=$(docker logs ci-db 2>&1 | grep -c 'ready to accept connections' || true)
            if [ "$ready" -ge 2 ] && docker exec ci-db pg_isready -U shaka > /dev/null 2>&1; then
              echo "Postgres ready (final server)"; break
            fi
            sleep 2
          done
          docker exec ci-db pg_isready -U shaka || { docker logs ci-db | tail -30; exit 1; }

      - name: Seed contract fixture
        if: steps.relevant.outputs.monitor == 'true'
        run: |
          docker exec -i ci-db psql -v ON_ERROR_STOP=1 -U shaka -d shaka < monitoring/fixtures/seed.sql

      - uses: actions/setup-java@v4
        if: steps.relevant.outputs.monitor == 'true'
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        if: steps.relevant.outputs.monitor == 'true'

      - name: Build API jar
        if: steps.relevant.outputs.monitor == 'true'
        working-directory: shaka-api
        run: ./gradlew shadowJar --no-daemon

      - name: Boot API (schedulers disabled) and run probe contract
        if: steps.relevant.outputs.monitor == 'true'
        env:
          # DISABLE_SCHEDULED_JOBS is mandatory here: without it the API would
          # start fetching 800+ spots from Open-Meteo out of CI after 2 minutes,
          # and weather_tile_pipeline would poison /health/summary severity.
          DATABASE_URL: postgresql://shaka:shaka@localhost:5432/shaka
          DISABLE_SCHEDULED_JOBS: 'true'
        run: |
          java -jar shaka-api/build/libs/shaka-api-all.jar > api.log 2>&1 &
          API_PID=$!
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/v1/health > /dev/null; then break; fi
            if ! kill -0 $API_PID 2>/dev/null; then echo "API died on boot"; tail -50 api.log; exit 1; fi
            sleep 2
          done
          curl -sf http://localhost:8080/v1/health || { echo "API never became healthy"; tail -50 api.log; exit 1; }
          python3 monitoring/probe.py --local --base-url http://localhost:8080/v1
          RESULT=$?
          kill $API_PID || true
          exit $RESULT

      - name: Dump API log on failure
        if: failure() && steps.relevant.outputs.monitor == 'true'
        run: tail -200 api.log || true
