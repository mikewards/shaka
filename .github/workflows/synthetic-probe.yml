name: Synthetic Probe

# RETIRED (Jul 2026): replaced by synthetic-monitor.yml + monitoring/probe.py
# (see docs/synthetic-monitor-design.md). The cron schedule is disabled so this
# stops emailing hourly; workflow_dispatch is kept for reference/comparison
# until the new monitor is proven, then this file and scripts/synthetic_probe.py
# can be deleted.

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run synthetic probe
        env:
          PROBE_HEARTBEAT_URL: ${{ secrets.PROBE_HEARTBEAT_URL }}
        run: python3 scripts/synthetic_probe.py
