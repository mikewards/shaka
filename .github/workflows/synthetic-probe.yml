name: Synthetic Probe

# Exercises the exact production endpoints the mobile app uses, plus drift
# checks on high-churn upstreams. A red run = users are (or are about to be)
# affected. Pair with a Better Stack heartbeat monitor on PROBE_HEARTBEAT_URL
# so a silently-stopped workflow also alerts.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run synthetic probe
        env:
          PROBE_HEARTBEAT_URL: ${{ secrets.PROBE_HEARTBEAT_URL }}
        run: python3 scripts/synthetic_probe.py
