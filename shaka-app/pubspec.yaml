name: shaka
description: Find the best spearfishing spots based on weather, ocean conditions, and fish patterns.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  http: ^1.2.0

  # Navigation
  go_router: ^13.0.0

  # Maps - Consolidating on MapLibre (flutter_map kept for gradual migration)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  maplibre_gl: ^0.25.0

  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  flutter_slidable: ^4.0.1
  
  # Caching
  flutter_cache_manager: ^3.3.2

  # WebView for Ocean Forecast
  webview_flutter: ^4.4.2
  
  # Connectivity
  connectivity_plus: ^5.0.2
  
  # File storage
  path_provider: ^2.1.1

  # Utils
  intl: ^0.18.1
  geolocator: ^10.1.0
  url_launcher: ^6.2.0
  permission_handler: ^11.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  retrofit_generator: ^8.0.6
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/html/
    - assets/shaka_silhouette.png