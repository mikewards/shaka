ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.shaka.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/shaka"
    url = ${?DATABASE_URL}
    driver = "org.postgresql.Driver"
    user = "shaka"
    user = ${?DATABASE_USER}
    password = ""
    password = ${?DATABASE_PASSWORD}
}

# External API base URLs live in their client classes (data/client/*).
# Credentials come from environment variables; see config/EnvValidation.kt
# for the audited list. (Removed: stale Redis block and Copernicus Motu
# endpoints that no code ever read.)
